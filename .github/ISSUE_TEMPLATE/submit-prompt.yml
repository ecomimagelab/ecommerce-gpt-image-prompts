name: Submit an e-commerce prompt
description: Submit a GPT Image 2 prompt with licensed generated examples
title: "[Prompt] "
labels:
  - prompt-submission
body:
  - type: markdown
    attributes:
      value: |
        ## Submit an e-commerce GPT Image 2 prompt

        Submit original, public-domain, or explicitly licensed material only. A Pinterest link may be supplied as visual research, but attribution alone does not authorize copying or redistributing the image.

        A maintainer first reviews the Issue. The `approved` label creates a review pull request; it does not publish directly to `main`.

  - type: input
    id: prompt_title
    attributes:
      label: Prompt Title
      description: A clear title of no more than 120 characters.
      placeholder: Product-faithful serum hero on carved travertine
    validations:
      required: true

  - type: dropdown
    id: generation_mode
    attributes:
      label: Generation Mode
      description: Product-edit requires a real product reference and a Before image.
      options:
        - product-edit
        - text-to-image
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: Prompt
      description: A complete prompt for one standalone image, not a contact sheet.
      render: text
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain the commerce task and intended result.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - automotive-accessories
        - bags-and-accessories
        - beauty
        - bedding-and-textiles
        - consumer-electronics
        - cycling
        - fashion
        - food-and-beverage
        - footwear
        - garden-and-planters
        - home-and-furniture
        - jewelry
        - kitchen-appliances
        - outdoor-gear
        - pet-supplies
        - tea-and-grocery
        - toys-and-kids
        - watches
    validations:
      required: true

  - type: dropdown
    id: use_case
    attributes:
      label: Use Case
      options:
        - main-image
        - catalog-image
        - branded-hero
        - lifestyle-scene
        - feature-callout
        - detail-macro
        - social-ad
        - a-plus-content
        - on-model
        - packaging-concept
    validations:
      required: true

  - type: dropdown
    id: asset_purpose
    attributes:
      label: Asset Purpose
      options:
        - main-image
        - catalog-image
        - branded-hero
        - secondary-image
        - social-creative
        - campaign-set
    validations:
      required: true

  - type: input
    id: styles
    attributes:
      label: Styles
      description: One to three comma-separated taxonomy IDs from data/taxonomy.json.
      placeholder: luxury-premium, minimalist-clean
    validations:
      required: true

  - type: dropdown
    id: background
    attributes:
      label: Background
      options:
        - pure-white
        - soft-studio
        - color-studio
        - dark-studio
        - natural-material
        - home-interior
        - outdoor-location
        - lifestyle-location
        - graphic-set
        - mixed
    validations:
      required: true

  - type: input
    id: platforms
    attributes:
      label: Platforms
      description: Comma-separated platform IDs from data/taxonomy.json.
      placeholder: amazon, shopify, instagram-shop
    validations:
      required: true

  - type: input
    id: aspect_ratio
    attributes:
      label: Aspect Ratio
      placeholder: "4:5"
    validations:
      required: true

  - type: input
    id: reference_image_count
    attributes:
      label: Reference Image Count
      description: Use 0 for text-to-image. Product-edit requires at least 1.
      placeholder: "1"
    validations:
      required: true

  - type: textarea
    id: input_requirements
    attributes:
      label: Input Requirements
      description: Explain the required angles, lighting, resolution, and rights status of input images.
    validations:
      required: true

  - type: textarea
    id: product_invariants
    attributes:
      label: Product Invariants
      description: One invariant per line, such as shape, color, label, proportions, and material finish.
    validations:
      required: true

  - type: textarea
    id: negative_prompt
    attributes:
      label: Negative Prompt
      description: List prohibited changes, artifacts, unsupported claims, and quality failures.
    validations:
      required: true

  - type: input
    id: before_image_url
    attributes:
      label: Before Image URL
      description: Required for product-edit. Use a public HTTPS URL for an image you may legally share.

  - type: textarea
    id: generated_image_urls
    attributes:
      label: Generated Image URLs
      description: At least two public HTTPS generated outputs, one per line. Do not use Pinterest-hosted images.
      placeholder: |
        https://example.com/generated-1.png
        https://example.com/generated-2.png
        https://example.com/generated-3.png
    validations:
      required: true

  - type: input
    id: original_author
    attributes:
      label: Original Author
      description: The creator's name or public handle.
    validations:
      required: true

  - type: input
    id: author_profile_link
    attributes:
      label: Author Profile Link
      description: A public author profile or portfolio URL.

  - type: dropdown
    id: source_type
    attributes:
      label: Source Type
      options:
        - original
        - community
        - licensed
        - public-domain
    validations:
      required: true

  - type: input
    id: source_link
    attributes:
      label: Source Link
      description: Original publication or license page. Required for third-party material.

  - type: dropdown
    id: permission_basis
    attributes:
      label: Permission Basis
      options:
        - creator-granted
        - compatible-license
        - public-domain
        - repository-authored
    validations:
      required: true

  - type: input
    id: license
    attributes:
      label: License
      description: SPDX-style identifier or a concise permission statement.
      placeholder: CC-BY-4.0
    validations:
      required: true

  - type: textarea
    id: visual_research_links
    attributes:
      label: Visual Research Links
      description: Optional inspiration links, including Pinterest. These links are research references, not permission to copy an image.

  - type: textarea
    id: official_platform_policy_sources
    attributes:
      label: Official Platform Policy Sources
      description: Optional official HTTPS policy URLs supporting any platform-compliance statement.

  - type: dropdown
    id: prompt_language
    attributes:
      label: Prompt Language
      options:
        - en
        - zh
        - zh-TW
        - ja-JP
        - ko-KR
        - th-TH
        - vi-VN
        - hi-IN
        - es-ES
        - es-419
        - de-DE
        - fr-FR
        - it-IT
        - pt-BR
        - pt-PT
        - tr-TR
    validations:
      required: true

  - type: checkboxes
    id: rights
    attributes:
      label: Rights and Safety
      options:
        - label: I own the submitted material or have documented permission compatible with public redistribution.
          required: true
        - label: I understand that attribution or a Pinterest source link alone is not redistribution permission.
          required: true
        - label: The generated examples actually result from this prompt and any disclosed reference inputs.
          required: true
        - label: The submission contains no unsupported product, medical, environmental, safety, durability, or performance claims.
          required: true
        - label: The submission contains no unsafe, deceptive, private, or clearly infringing content.
          required: true

