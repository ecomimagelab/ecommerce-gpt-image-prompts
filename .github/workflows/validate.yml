name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build generated views
        run: npm run generate
      - name: Validate prompt files, taxonomy, rights metadata, and image ratios
        run: npm run validate
      - name: Verify generated data and READMEs are committed
        run: |
          git diff --exit-code -- data/prompts.json README*.md
