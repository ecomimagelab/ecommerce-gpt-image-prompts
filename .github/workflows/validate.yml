name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate structured prompt data
        run: npm run validate
      - name: Verify generated READMEs
        run: |
          npm run generate
          git diff --exit-code -- README*.md

